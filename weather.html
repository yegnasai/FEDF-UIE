<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body>
    <input id="city" placeholder="Enter city">
    <button onclick="getWeather()">Get Weather</button>
    <h2 id="temp"></h2>

    <script>
        async function getWeather() {
            let city = document.getElementById("city").value;
            
            // Note: Keep your API Key private in production!
            let res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=6a078cebece254466ebd766a6a091db6&units=metric`);
            let data = await res.json();

            if (data.main) {
                document.getElementById("temp").innerText = data.main.temp + " °C";
            } else {
                document.getElementById("temp").innerText = "City not found";
            }
        }
    </script>
</body>
</html>
