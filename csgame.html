<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            text-align:center;
            background:#1e3c72;
            color:white;
        }
        button{
            padding:20px;
            font-size:20px;
            border:none;
            border-radius:50%;
            background:#ff4d4d;
            color:white;
        }
        h1{
            font-size:50px;
        }
    </style>
</head>
<body>
    <h2> Click Speed Game </h2>
    <button onclick="clickMe()">CLICK</button>
    <h1 id="score">0</h1>

    <script>
        let score=0;

        function clickMe(){
            score++;
            document.getElementById("score").innerText=score;
        }
    </script>
</body>
</html>
